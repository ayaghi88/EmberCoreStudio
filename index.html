<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ember Core Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- This hidden form allows Netlify to detect your contact form at build time -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="fullName" />
      <input type="email" name="email" />
      <select name="service">
        <option value="SBA Funding"></option>
        <option value="Angel Investment"></option>
        <option value="Curriculum Cohort"></option>
        <option value="General Alliance"></option>
      </select>
      <textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
