<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->

    <!-- Open Graph / Facebook / YouTube / LinkedIn / Discord Link Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://embercorestudio.org/" />
    <meta property="og:title" content="Ember Core Studio" />
    <meta property="og:description" content="Premium multi-utility launcher for authors and creators featuring Shrink and Send, Text Detox Alchemy, and Authors Linguist." />
    <meta property="og:image" content="https://embercorestudio.org/og-image.png" />

    <!-- Twitter Card previews -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://embercorestudio.org/" />
    <meta name="twitter:title" content="Ember Core Studio" />
    <meta name="twitter:description" content="Premium multi-utility launcher for authors and creators featuring Shrink and Send, Text Detox Alchemy, and Authors Linguist." />
    <meta name="twitter:image" content="https://embercorestudio.org/og-image.png" />

    <!-- Google Knowledge Panel Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Amber Yaghi",
      "url": "https://www.amberyaghi.org",
      "sameAs": [
        "https://www.linkedin.com/in/amberyaghi",
        "https://youtube.com/@amberyaghispeaks",
        "https://www.embercorestudio.org",
        "https://www.shrinkandsend.com",
        "https://lovablelearner.com",
        "https://authorslinguist.netlify.app",
        "https://ambershealthcare.com",
        "https://textdetoxalchemy.com",
        "https://www.amazon.com/stores/Amber-Yaghi/author/B0FKZ4T8V8/allbooks?",
        "https://www.amazon.com/shop/amilli_love"
      ],
      "jobTitle": ["Author", "Founder"],
      "description": "Author, tech founder, and health AI professional."
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- This hidden form allows Netlify to detect your contact form at build time -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="fullName" />
      <input type="email" name="email" />
      <select name="service">
        <option value="SBA Funding"></option>
        <option value="Angel Investment"></option>
        <option value="Curriculum Cohort"></option>
        <option value="General Alliance"></option>
      </select>
      <textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
